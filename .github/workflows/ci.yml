name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y binutils-dev lcov

    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=ON -DCOVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build

    - name: Run unit and integration tests
      run: cd build && ctest --output-on-failure

    - name: Generate code coverage report
      run: |
        lcov --capture --directory build --output-file coverage.info --no-external
        lcov --remove coverage.info '*/tests/*' '*/build/_deps/*' --output-file coverage.info
        genhtml coverage.info --output-directory coverage-report
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        lcov --summary coverage.info 2>&1 | tail -3 >> $GITHUB_STEP_SUMMARY

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/
