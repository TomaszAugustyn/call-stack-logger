name: CI

permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  gcc:
    name: GCC (build, test, coverage)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y binutils-dev libc6-dbg lcov

    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=ON -DCOVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build

    - name: Run unit and integration tests
      run: cd build && ctest --output-on-failure

    - name: Generate code coverage report
      run: |
        # Capture: skip --no-external (lcov 2.0 uses --directory as base, which would
        # exclude our src/ files since they're outside the build dir). --ignore-errors
        # mismatch bypasses strict checks on gtest code that trigger false positives;
        # negative is a belt-and-suspenders tolerance for any residual gcov counter
        # artifact from multi-threaded coverage (the real fix is -fprofile-update=atomic
        # in CMakeLists.txt, which keeps the counters from going negative in the first place).
        lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,negative
        # Remove system headers, test code, and fetched dependencies.
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info
        genhtml coverage.info --output-directory coverage-report
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        lcov --summary coverage.info 2>&1 | tail -3 >> $GITHUB_STEP_SUMMARY

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/

  gcc-optimized:
    name: GCC RelWithDebInfo (optimized build, test)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y binutils-dev libc6-dbg

    # RelWithDebInfo (-O2 -g) is the build type the README recommends to
    # integrators — and the one where optimizer inlining and sibling-call
    # optimization once silently collapsed the frame-6 unwind chain and broke
    # caller resolution on every trace line. This job pins the whole suite
    # under optimization so that class of regression fails CI immediately.
    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo

    - name: Build
      run: cmake --build build

    - name: Run unit and integration tests
      run: cd build && ctest --output-on-failure

  clang:
    name: Clang (build, test)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y clang binutils-dev libc6-dbg

    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=ON -DCMAKE_CXX_COMPILER=clang++

    - name: Build
      run: cmake --build build

    - name: Run unit and integration tests
      run: cd build && ctest --output-on-failure

  sanitize-asan:
    name: Sanitize (GCC, ASan + UBSan + LSan)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y binutils-dev libc6-dbg

    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=ON -DSANITIZE=address+undefined

    - name: Build
      run: cmake --build build

    - name: Run unit and integration tests under ASan + UBSan + LSan
      env:
        ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        # libbfd keeps its symbol-table / object-file caches live to program exit;
        # these are not leaks in cslg's code — see tests/lsan-suppressions.txt.
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan-suppressions.txt:print_suppressions=0
      run: cd build && ctest --output-on-failure

  sanitize-tsan:
    name: Sanitize (GCC, TSan)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y binutils-dev libc6-dbg

    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=ON -DSANITIZE=thread

    - name: Build
      run: cmake --build build

    - name: Run unit and integration tests under TSan
      env:
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
      run: cd build && ctest --output-on-failure
