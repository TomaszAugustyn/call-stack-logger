services:
  # Build the project (library + demo executable)
  build:
    build: .
    volumes:
      - .:/workspace
    command: >
      bash -c "
        cmake -B build &&
        cmake --build build -j$$(nproc)
      "

  # Build with tests and run all tests (unit + integration)
  test:
    build: .
    volumes:
      - .:/workspace
    command: >
      bash -c "
        cmake -B build -DBUILD_TESTS=ON &&
        cmake --build build -j$$(nproc) &&
        cd build && ctest --output-on-failure
      "

  # Build and run tests with Clang (uses separate build directory)
  test-clang:
    build: .
    volumes:
      - .:/workspace
    command: >
      bash -c "
        cmake -B build-clang -DBUILD_TESTS=ON -DCMAKE_CXX_COMPILER=clang++ &&
        cmake --build build-clang -j$$(nproc) &&
        cd build-clang && ctest --output-on-failure
      "

  # Build with tests + coverage, run tests, generate HTML coverage report
  coverage:
    build: .
    volumes:
      - .:/workspace
    command: >
      bash -c "
        cmake -B build -DBUILD_TESTS=ON -DCOVERAGE=ON -DCMAKE_BUILD_TYPE=Debug &&
        cmake --build build -j$$(nproc) &&
        cd build && ctest --output-on-failure && cd /workspace &&
        lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch &&
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info &&
        genhtml coverage.info --output-directory /workspace/coverage-report &&
        echo '' &&
        echo '=== Coverage report generated at coverage-report/index.html ==='
      "

  # AddressSanitizer + UndefinedBehaviorSanitizer run (GCC).
  # LSan suppression file bypasses BFD-internal caches that persist to exit.
  sanitize-asan:
    build: .
    volumes:
      - .:/workspace
    environment:
      ASAN_OPTIONS: "halt_on_error=1:detect_leaks=1"
      UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
      LSAN_OPTIONS: "suppressions=/workspace/tests/lsan-suppressions.txt:print_suppressions=0"
    command: >
      bash -c "
        cmake -B build-asan -DBUILD_TESTS=ON -DSANITIZE=address+undefined &&
        cmake --build build-asan -j$$(nproc) &&
        cd build-asan && ctest --output-on-failure
      "

  # ThreadSanitizer run (GCC). Mutually exclusive with ASan.
  sanitize-tsan:
    build: .
    volumes:
      - .:/workspace
    environment:
      TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"
    command: >
      bash -c "
        cmake -B build-tsan -DBUILD_TESTS=ON -DSANITIZE=thread &&
        cmake --build build-tsan -j$$(nproc) &&
        cd build-tsan && ctest --output-on-failure
      "
